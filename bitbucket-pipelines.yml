image: node:20

pipelines:
  custom:
    deploy-dev:
      - step:
          name: Build and Deploy to Vercel (Development)
          script:
            # Uses the current branch
            # Ensure we're using the develop branch
            - git fetch
            - git checkout develop
            # Export NPM_TOKEN for private package authentication
            - export NPM_TOKEN=$NPM_TOKEN
            - npm install -g vercel
            - vercel pull --yes --environment=preview --token $VERCEL_TOKEN
            - vercel build --token $VERCEL_TOKEN
            - vercel deploy --prebuilt --yes --token $VERCEL_TOKEN
    deploy-stage:
      - step:
          name: Build and Deploy to Vercel (Staging)
          script:
            # Uses the current branch
            # Ensure we're using the develop branch
            - git fetch
            - git checkout develop
            # Export NPM_TOKEN for private package authentication
            - export NPM_TOKEN=$NPM_TOKEN
            - npm install -g vercel
            - vercel pull --yes --environment=preview --token $VERCEL_TOKEN
            - vercel build --token $VERCEL_TOKEN
            # Use staging branch as target
            - vercel deploy --prebuilt --yes --token $VERCEL_TOKEN --meta BRANCH=staging
  branches:
    master:
      - step:
          name: Build and Deploy to Vercel (Production)
          script:
            # Export NPM_TOKEN for private package authentication
            - export NPM_TOKEN=$NPM_TOKEN
            - npm install -g vercel
            - vercel pull --yes --environment=production --token $VERCEL_TOKEN
            - vercel build --token $VERCEL_TOKEN
            - vercel deploy --prebuilt --prod --yes --token $VERCEL_TOKEN
