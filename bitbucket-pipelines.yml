image: node:20

pipelines:
  custom:
    deploy-dev:
      - step:
          name: Build and Deploy to Vercel (Development)
          script:
            # Uses the current branch
            # Ensure we're using the develop branch
            - git fetch
            - git checkout develop
            # Create .npmrc for Yarn 1.x authentication with private packages
            # Yarn 1.x requires .npmrc (not .yarnrc.yml) for authentication
            - |
              if [ -z "$NPM_TOKEN" ]; then
                echo "ERROR: NPM_TOKEN environment variable is not set!"
                exit 1
              fi
              # Create .npmrc in project root
              echo "@bildit-platform:registry=https://registry.npmjs.org/" > .npmrc
              echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
              # Also create in home directory for Yarn to find it
              mkdir -p ~
              echo "@bildit-platform:registry=https://registry.npmjs.org/" > ~/.npmrc
              echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
              echo "Created .npmrc files for npm authentication"
              # Verify authentication works (test with a simple npm whoami or package check)
              echo "Verifying npm authentication..."
              npm whoami --registry=https://registry.npmjs.org/ || echo "Warning: npm whoami failed, but continuing..."
            - npm install -g vercel
            - vercel pull --yes --environment=preview --token $VERCEL_TOKEN
            - vercel build --token $VERCEL_TOKEN
            - vercel deploy --prebuilt --yes --token $VERCEL_TOKEN
    deploy-stage:
      - step:
          name: Build and Deploy to Vercel (Staging)
          script:
            # Uses the current branch
            # Ensure we're using the develop branch
            - git fetch
            - git checkout develop
            # Create .npmrc for Yarn 1.x authentication with private packages
            # Yarn 1.x requires .npmrc (not .yarnrc.yml) for authentication
            - |
              if [ -z "$NPM_TOKEN" ]; then
                echo "ERROR: NPM_TOKEN environment variable is not set!"
                exit 1
              fi
              # Create .npmrc in project root
              echo "@bildit-platform:registry=https://registry.npmjs.org/" > .npmrc
              echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
              # Also create in home directory for Yarn to find it
              mkdir -p ~
              echo "@bildit-platform:registry=https://registry.npmjs.org/" > ~/.npmrc
              echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
              echo "Created .npmrc files for npm authentication"
              # Verify authentication works (test with a simple npm whoami or package check)
              echo "Verifying npm authentication..."
              npm whoami --registry=https://registry.npmjs.org/ || echo "Warning: npm whoami failed, but continuing..."
            - npm install -g vercel
            - vercel pull --yes --environment=preview --token $VERCEL_TOKEN
            - vercel build --token $VERCEL_TOKEN
            # Use staging branch as target
            - vercel deploy --prebuilt --yes --token $VERCEL_TOKEN --meta BRANCH=staging
  branches:
    master:
      - step:
          name: Build and Deploy to Vercel (Production)
          script:
            # Create .npmrc for Yarn 1.x authentication with private packages
            # Yarn 1.x requires .npmrc (not .yarnrc.yml) for authentication
            - |
              if [ -z "$NPM_TOKEN" ]; then
                echo "ERROR: NPM_TOKEN environment variable is not set!"
                exit 1
              fi
              # Create .npmrc in project root
              echo "@bildit-platform:registry=https://registry.npmjs.org/" > .npmrc
              echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
              # Also create in home directory for Yarn to find it
              mkdir -p ~
              echo "@bildit-platform:registry=https://registry.npmjs.org/" > ~/.npmrc
              echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
              echo "Created .npmrc files for npm authentication"
              # Verify authentication works (test with a simple npm whoami or package check)
              echo "Verifying npm authentication..."
              npm whoami --registry=https://registry.npmjs.org/ || echo "Warning: npm whoami failed, but continuing..."
            - npm install -g vercel
            - vercel pull --yes --environment=production --token $VERCEL_TOKEN
            - vercel build --token $VERCEL_TOKEN
            - vercel deploy --prebuilt --prod --yes --token $VERCEL_TOKEN
