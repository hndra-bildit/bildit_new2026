# Tells Yarn that any package under the @bildit-platform scope
# should be fetched from the official npm registry.
npmScopes:
  bildit-platform:
    npmRegistryServer: "https://registry.npmjs.org"

# Configures authentication for the official npm registry.
# This uses an environment variable for security.
npmRegistries:
  "//registry.npmjs.org":
    npmAuthToken: "${NPM_TOKEN}"